<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Лаконичный Блог</title>
    <style>
        /* Основные стили */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #333;
        }

        header {
            background: #fff;
            border-bottom: 1px solid #eee;
            padding: 2rem 0;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Стили постов */
        article {
            background: #fff;
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 { margin-bottom: 0.5rem; }
        h2 { color: #222; }
        
        .date {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 1.5rem;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* Кнопка "Читать далее" */
        .btn {
            display: inline-block;
            margin-top: 15px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .btn:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header>
        <h1>Меньше — значит больше</h1>
        <p>Заметки о простоте в мире хаоса</p>
    </header>

    <div class="container">
        
        <article>
            <div class="date">15 Октября, 2023</div>
            <h2>С чего начать путь к минимализму?</h2>
            <p>Минимализм — это не про пустые комнаты, а про то, чтобы освободить место для вещей, которые действительно важны.
