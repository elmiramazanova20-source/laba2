<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Упс! Страница не найдена — 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #333;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 900;
            color: #007bff;
            line-height: 1;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 2rem;
        }

        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: background 0.3s ease, transform 0.2s ease;
        }

        .btn-home:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        /* Анимация левитации */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* Адаптив для мобильных */
        @media (max-width: 480px) {
            .error-code { font-size: 6rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">404</div>
        <h1>Кажется, вы зашли не туда</h1>
        <p>Страница, которую вы ищете, не существует или была перемещена.<br> 
        Давайте вернемся на правильный путь.</p>
        
        <a href="/" class="btn-home">Вернуться на главную</a>
    </div>

</body>
</html>
